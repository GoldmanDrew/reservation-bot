snipes:
  - id: example-carbone
    enabled: false
    platform: resy
    venue_id: "6194"
    restaurant_name: Carbone
    target_date: "2026-06-15"
    party_size: 2
    preferred_times:
      - "19:00"
      - "19:30"
      - "20:00"
    mode: drop
    drop_at: "2026-05-16T13:00:00.000Z"
    dry_run: true

  - id: example-poll
    enabled: false
    platform: resy
    venue_id: "6194"
    restaurant_name: Carbone
    target_date: "2026-06-15"
    party_size: 2
    preferred_times:
      - "19:00"
      - "19:30"
    mode: poll
    dry_run: true
