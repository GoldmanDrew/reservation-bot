name: Reservation Sniper

on:
  schedule:
    # Health check + Telegram inbox between drops (GitHub may delay these; do not rely on them for drop timing)
    - cron: "*/5 * * * *"
    # Drop snipe: 8:54 AM America/New_York (6 min before the 9:00 AM release). One pair handles DST:
    #   EDT (Mar–Nov): 8:54 AM = 12:54 UTC
    #   EST (Nov–Mar): 8:54 AM = 13:54 UTC
    # Snipes outside today's drop window exit immediately via shouldRunDropSnipe().
    - cron: "54 12 * * *"
    - cron: "54 13 * * *"
  workflow_dispatch:
    inputs:
      snipe_id:
        description: "Run only this snipe ID (leave empty for all due snipes)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check OpenTable session
        env:
          OPENTABLE_COOKIES: ${{ secrets.OPENTABLE_COOKIES }}
          OPENTABLE_CSRF_TOKEN: ${{ secrets.OPENTABLE_CSRF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/check-opentable-session.mjs
        continue-on-error: true

      - name: Process Telegram inbox
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/telegram-inbox.mjs
        continue-on-error: true

      - name: Run sniper
        env:
          RESY_EMAIL: ${{ secrets.RESY_EMAIL }}
          RESY_PASSWORD: ${{ secrets.RESY_PASSWORD }}
          RESY_API_KEY: ${{ secrets.RESY_API_KEY }}
          RESY_AUTH_TOKEN: ${{ secrets.RESY_AUTH_TOKEN }}
          OPENTABLE_COOKIES: ${{ secrets.OPENTABLE_COOKIES }}
          OPENTABLE_CSRF_TOKEN: ${{ secrets.OPENTABLE_CSRF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SNIPE_ID: ${{ github.event.inputs.snipe_id }}
        run: node scripts/run-snipes.mjs

      - name: Commit disabled snipes
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add config/snipes.yaml config/telegram-state.yaml
          if git diff --staged --quiet; then
            echo "No bot state changes"
          else
            git commit -m "Bot state: snipes and/or Telegram offset"
            git push origin HEAD:main
          fi
