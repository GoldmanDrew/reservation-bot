name: Test Telegram

on:
  workflow_dispatch:
  repository_dispatch:
    types: [test-telegram]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/test-telegram.mjs

      - name: Process bot inbox (/start, /test replies)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/telegram-inbox.mjs

      - name: Commit telegram offset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/telegram-state.yaml
          git diff --staged --quiet || git commit -m "Update Telegram inbox offset"
          git push
